services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DTC_DB_NAME:-dtc_market}
      MYSQL_USER: ${DTC_DB_USER:-dtc_user}
      MYSQL_PASSWORD: ${DTC_DB_PASSWORD:-dtc_password}
      MYSQL_ROOT_PASSWORD: ${DTC_DB_ROOT_PASSWORD:-dtc_root_password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DTC_DB_HOST: mysql
      DTC_DB_PORT: 3306
      DTC_DB_NAME: ${DTC_DB_NAME:-dtc_market}
      DTC_DB_USER: ${DTC_DB_USER:-dtc_user}
      DTC_DB_PASSWORD: ${DTC_DB_PASSWORD:-dtc_password}
      DTC_INIT_DB: "true"
      DTC_API_KEYS: ${DTC_API_KEYS:-change-me-before-production}
      DTC_STORAGE_BACKEND: ${DTC_STORAGE_BACKEND:-local}
      DTC_LOCAL_STORAGE_DIR: /app/data/images
      DTC_LOCAL_STORAGE_PUBLIC_BASE_URL: /media
      DTC_GCS_BUCKET: ${DTC_GCS_BUCKET:-}
      DTC_GCS_PREFIX: ${DTC_GCS_PREFIX:-market-monitor}
      DTC_GCS_PUBLIC_BASE_URL: ${DTC_GCS_PUBLIC_BASE_URL:-}
      DTC_STORAGE_ENABLED: ${DTC_STORAGE_ENABLED:-false}
      DTC_SAVE_JSON_BACKUP: ${DTC_SAVE_JSON_BACKUP:-true}
    ports:
      - "${DTC_API_PORT:-8000}:8000"
    volumes:
      - app_data:/app/data
    command: ["uvicorn", "dtc.api:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  scheduler:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DTC_DB_HOST: mysql
      DTC_DB_PORT: 3306
      DTC_DB_NAME: ${DTC_DB_NAME:-dtc_market}
      DTC_DB_USER: ${DTC_DB_USER:-dtc_user}
      DTC_DB_PASSWORD: ${DTC_DB_PASSWORD:-dtc_password}
      DTC_INIT_DB: "false"
      DTC_STORAGE_BACKEND: ${DTC_STORAGE_BACKEND:-local}
      DTC_LOCAL_STORAGE_DIR: /app/data/images
      DTC_LOCAL_STORAGE_PUBLIC_BASE_URL: /media
      DTC_GCS_BUCKET: ${DTC_GCS_BUCKET:-}
      DTC_GCS_PREFIX: ${DTC_GCS_PREFIX:-market-monitor}
      DTC_GCS_PUBLIC_BASE_URL: ${DTC_GCS_PUBLIC_BASE_URL:-}
      DTC_STORAGE_ENABLED: ${DTC_STORAGE_ENABLED:-false}
      DTC_SAVE_JSON_BACKUP: ${DTC_SAVE_JSON_BACKUP:-true}
      DTC_DAILY_RUN_AT: ${DTC_DAILY_RUN_AT:-03:15}
      DTC_RUN_ON_STARTUP: ${DTC_RUN_ON_STARTUP:-false}
    volumes:
      - app_data:/app/data
    command: ["scripts/run_scheduler.sh"]

volumes:
  mysql_data:
  app_data:
